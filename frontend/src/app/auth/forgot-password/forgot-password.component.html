<div class="login-container">
  <a routerLink="/login" class="back-home"><span class="arrow">←</span><span>Back to login</span></a>
  <div class="login-card">
    <!-- Page Title -->
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email to reset your password</p>

    <!-- Success Message (replaces form) -->
    <div class="success-message" *ngIf="submitted" role="status">
      Check your email for a password reset link.
    </div>

    <!-- Forgot Password Form -->
    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!submitted">

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage" role="alert">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="!email || loading"
        >
          {{ loading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </div>
    </form>

    <!-- Link to Login -->
    <div class="signup-link" *ngIf="!submitted">
      Remember your password?
      <a routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
