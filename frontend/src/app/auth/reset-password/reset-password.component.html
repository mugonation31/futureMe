<div class="login-container">
  <a routerLink="/login" class="back-home"><span class="arrow">←</span><span>Back to login</span></a>
  <div class="login-card">
    <!-- Page Title -->
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password below</p>

    <!-- Error state (no token) -->
    <div class="error-message" *ngIf="!token" role="alert">
      {{ errorMessage }}
    </div>

    <!-- Reset Password Form (only shown when token is present) -->
    <form (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="token">

      <!-- New Password Input -->
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="At least 6 characters"
          required
          minlength="6"
          [disabled]="loading"
        />
      </div>

      <!-- Confirm Password Input -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Re-enter your new password"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage" role="alert">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="!passwordsValid || loading"
        >
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </div>
    </form>

    <!-- Link to Login -->
    <div class="signup-link">
      <a routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
