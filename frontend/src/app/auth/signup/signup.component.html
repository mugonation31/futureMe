<div class="signup-container">
  <a routerLink="/" class="back-home"><span class="arrow">←</span><span>Back to home</span></a>
  <div class="signup-card">
    <!-- Page Title -->
    <h2>Create Account</h2>
    <p class="subtitle">Create your futureMe account</p>

    <!-- Signup Form -->
    <form (ngSubmit)="onSignup()" #signupForm="ngForm">

      <!-- Name Input -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          [(ngModel)]="name"
          placeholder="Enter your full name"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword['password'] ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            placeholder="At least 6 characters"
            required
            [disabled]="loading"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility('password')"
            [attr.aria-label]="showPassword['password'] ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword['password']" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword['password']" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>

        <!-- Password rules hint -->
        <ul class="password-rules" *ngIf="password.length > 0">
          <li [class.met]="password.length >= 6">At least 6 characters</li>
          <li [class.met]="hasDigit(password)">At least one digit (0–9)</li>
          <li [class.met]="hasSpecialChar(password)">At least one special character (!, &#64;, #, ...)</li>
        </ul>
      </div>

      <!-- Confirm Password Input -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword['confirmPassword'] ? 'text' : 'password'"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Re-enter your password"
            required
            [disabled]="loading"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility('confirmPassword')"
            [attr.aria-label]="showPassword['confirmPassword'] ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword['confirmPassword']" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword['confirmPassword']" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="loading"
        >
          {{ loading ? 'Creating account...' : 'Sign Up' }}
        </button>
      </div>
    </form>

    <!-- Link to Login -->
    <div class="login-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
