<div class="page">
  <h1>Opportunities</h1>

  <div *ngIf="loading" class="loading">Loading...</div>

  <ng-container *ngIf="!loading">
    <!-- Surplus summary -->
    <div class="card surplus-card" [ngClass]="surplus > 0 ? 'positive-bg' : 'neutral-bg'">
      <p class="label">Monthly Surplus</p>
      <h2 class="amount" [class.positive]="surplus > 0" [class.caution]="surplus <= 0">
        {{ surplus | currency:'GBP':'symbol':'1.0-0' }}
      </h2>
      <p *ngIf="surplus <= 0" class="no-surplus-msg">
        No surplus this month. Review your <a routerLink="/money-plan">Money Plan</a> to find savings.
      </p>
    </div>

    <!-- Suggestions list -->
    <div *ngIf="surplus > 0">
      <h2 class="section-title">Where to put it</h2>
      <div *ngFor="let s of suggestions" class="card suggestion-card">
        <div class="suggestion-header">
          <h3>{{ s.title }}</h3>
          <span class="suggestion-amount">{{ s.amount | currency:'GBP':'symbol':'1.0-0' }}</span>
        </div>
        <p class="suggestion-desc">{{ s.description }}</p>
        <a [routerLink]="s.routerLink" class="card-link">Go &rarr;</a>
      </div>
      <p *ngIf="!suggestions.length" class="empty-state">All goals are on track!</p>
    </div>
  </ng-container>
</div>
