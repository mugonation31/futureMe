<section class="card budget-section">
  <div class="section-header">
    <h2>Category Budgets</h2>
    <p class="section-subtitle">Set monthly spending limits per category</p>
  </div>

  <div *ngIf="loading" class="state-msg">Loading categories…</div>

  <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-banner">{{ successMessage }}</div>

  <div class="budget-grid" *ngIf="!loading && rows.length > 0">
    <div class="budget-field" *ngFor="let row of rows">
      <label>{{ row.category.name }}</label>
      <input
        type="number"
        class="tabular-nums"
        [(ngModel)]="row.limit"
        placeholder="No limit"
        min="0.01"
        step="0.01"
      />
    </div>
  </div>

  <div class="section-actions">
    <button type="button" class="btn-primary" (click)="onSave()" [disabled]="saving || loading">
      {{ saving ? 'Saving…' : 'Save Budgets' }}
    </button>
  </div>
</section>
