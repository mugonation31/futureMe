<div class="settings-page">
  <div class="page-content">
    <h1>Settings</h1>

    <div class="success-banner" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="settingsForm" (ngSubmit)="onSave()">
      <section class="card">
        <h2>Profile</h2>
        <div class="field">
          <label for="display_name">Display Name</label>
          <input
            type="text"
            id="display_name"
            formControlName="display_name"
            placeholder="Your name"
          />
        </div>
      </section>

      <section class="card">
        <h2>Budget Preferences</h2>
        <div class="field">
          <label for="currency">Currency</label>
          <select id="currency" formControlName="currency">
            <option value="GBP">GBP (£)</option>
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
          </select>
        </div>
        <div class="field">
          <label for="monthly_budget">Monthly Budget</label>
          <input
            type="number"
            id="monthly_budget"
            formControlName="monthly_budget"
            placeholder="e.g. 2000"
            min="0"
            step="0.01"
          />
        </div>
      </section>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Saving…' : 'Save Settings' }}
        </button>
      </div>
    </form>

    <app-budget-allocation></app-budget-allocation>
  </div>
</div>
