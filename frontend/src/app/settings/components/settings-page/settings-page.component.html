<div class="settings-container">
  <div class="header">
    <h1>Settings</h1>
  </div>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="onSave()" class="settings-form">
    <div class="settings-card">
      <h2 class="section-title">Profile</h2>

      <div class="form-group">
        <label for="display_name" class="form-label">Display Name</label>
        <input
          type="text"
          id="display_name"
          formControlName="display_name"
          class="form-input"
          placeholder="Your name"
        />
      </div>
    </div>

    <div class="settings-card">
      <h2 class="section-title">Budget Preferences</h2>

      <div class="form-group">
        <label for="currency" class="form-label">Currency</label>
        <select id="currency" formControlName="currency" class="form-input">
          <option value="GBP">GBP (£)</option>
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="monthly_budget" class="form-label">Monthly Budget</label>
        <input
          type="number"
          id="monthly_budget"
          formControlName="monthly_budget"
          class="form-input"
          placeholder="e.g. 2000"
          min="0"
          step="0.01"
        />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-submit" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Save Settings' }}
      </button>
    </div>
  </form>

  <app-budget-allocation></app-budget-allocation>
</div>
