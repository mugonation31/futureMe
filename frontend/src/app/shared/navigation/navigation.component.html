<nav *ngIf="currentUser" class="navbar">
  <div class="nav-inner">
    <div class="nav-brand">
      <a routerLink="/" class="brand-name">futureMe</a>
    </div>

    <button class="hamburger" [class.active]="menuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-menu" [class.open]="menuOpen">
      <div class="nav-links">
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Home</a>
        <a routerLink="/money-plan" routerLinkActive="active" (click)="closeMenu()">Money Plan</a>
        <a routerLink="/debts" routerLinkActive="active" (click)="closeMenu()">Debts</a>
        <a routerLink="/emergency-fund" routerLinkActive="active" (click)="closeMenu()">Emergency Fund</a>
        <a routerLink="/monthly-review" routerLinkActive="active" (click)="closeMenu()">Monthly Review</a>
        <a routerLink="/opportunities" routerLinkActive="active" (click)="closeMenu()">Opportunities</a>
        <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">Settings</a>
      </div>
      <div class="nav-user">
        <span class="greeting">{{ userName }}</span>
        <button class="btn-ghost logout-btn" (click)="logout(); closeMenu()">Log out</button>
      </div>
    </div>
  </div>
</nav>
