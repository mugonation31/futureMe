<form [formGroup]="form" (ngSubmit)="onSubmit()" data-testid="form-element">
  <div class="form-row">
    <div class="form-field">
      <label>Amount</label>
      <input type="number" formControlName="amount" min="0.01" step="0.01" data-testid="amount-input" />
      <span class="error" *ngIf="form.get('amount')?.invalid && form.get('amount')?.touched">
        Amount must be greater than 0
      </span>
    </div>

    <div class="form-field">
      <label>Type</label>
      <select formControlName="type" data-testid="type-select">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
    </div>

    <div class="form-field">
      <label>Category</label>
      <select formControlName="category_id" data-testid="category-select">
        <option [value]="null">-- None --</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

    <div class="form-field">
      <label>Description</label>
      <input type="text" formControlName="description" data-testid="description-input" />
    </div>

    <div class="form-field">
      <label>Date</label>
      <input type="date" formControlName="date" data-testid="date-input" />
    </div>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <button type="submit" class="btn-primary" [disabled]="form.invalid" data-testid="submit-btn">
    Save
  </button>
</form>
