<div class="card">
  <div class="list-header">
    <h2>Transactions</h2>
    <div class="controls">
      <select data-testid="month-selector" (change)="onMonthChange($event)">
        <option *ngFor="let m of months()" [value]="m">{{ m }}</option>
      </select>
      <button class="btn-primary" data-testid="add-transaction-btn" (click)="toggleForm()">
        Add Transaction
      </button>
    </div>
  </div>

  <app-transaction-form
    *ngIf="showForm"
    data-testid="transaction-form"
    (saved)="onSaved()">
  </app-transaction-form>

  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

  <table class="transactions-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Category</th>
        <th>Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of transactions" data-testid="transaction-row">
        <td>{{ t.date }}</td>
        <td>{{ t.description }}</td>
        <td>{{ t.category_name }}</td>
        <td>
          <span [class.amount-expense]="t.type === 'expense'"
                [class.amount-income]="t.type === 'income'">
            {{ t.amount | number:'1.2-2' }}
          </span>
        </td>
        <td>
          <button class="btn-ghost"
                  data-testid="delete-btn"
                  (click)="deleteTransaction(t.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
